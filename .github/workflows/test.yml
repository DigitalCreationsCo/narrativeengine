name: test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('python/pyproject.toml') }}

      - run: cargo test --workspace --exclude narrativeengine-py
      - run: python -m pip install -e "python[dev]"
        shell: bash
      - run: maturin develop --manifest-path crates/narrativeengine-py/Cargo.toml --extras pydantic
      - run: python -m pytest python
      - run: npm install
        working-directory: typescript
      - run: npm run build
        working-directory: typescript
      - run: npm test
        working-directory: typescript
      - run: ./scripts/test-parity.sh
        shell: bash
